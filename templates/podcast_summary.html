<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast Generator - ASIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .loading-pulse {
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 min-h-screen flex flex-col justify-between text-slate-100 font-sans">

    <!-- Ambient background audio -->
    <audio id="bg-music" src="/static/music.mp3" loop></audio>

    <!-- Decorative glows -->
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-12 flex-grow flex flex-col justify-center items-center relative z-10 max-w-4xl">
        
        <!-- Back Navigation -->
        <a href="/" class="self-start mb-8 flex items-center text-slate-400 hover:text-white transition-colors group">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-sm font-semibold">Back to Home</span>
        </a>

        <!-- Generator Container Card -->
        <div class="glass-card rounded-2xl p-8 w-full shadow-2xl animate__animated animate__fadeIn">
            
            <header class="text-center mb-8">
                <h1 class="text-4xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-300">
                    Podcast Generator
                </h1>
                <p class="text-slate-400 text-sm font-light">Convert static PDFs into a dynamic conversation between two hosts</p>
            </header>

            <!-- File Upload Drop Zone -->
            <div id="upload-container" class="mb-8 p-8 border-2 border-dashed border-purple-500/35 rounded-2xl text-center cursor-pointer hover:border-purple-400 transition-colors group">
                <input type="file" id="pdf-file" accept=".pdf" class="hidden" />
                <label for="pdf-file" class="cursor-pointer block">
                    <svg class="mx-auto h-16 w-16 text-purple-500 mb-4 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                    </svg>
                    <p id="file-name" class="text-slate-300 font-medium">Click or Drag & Drop PDF here</p>
                    <p class="text-slate-500 text-xs mt-2">Maximum file size: 10MB</p>
                </label>
            </div>

            <!-- Loading Indicator -->
            <div id="loader" class="hidden text-center py-6">
                <div class="inline-block w-8 h-8 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin mb-3"></div>
                <p class="text-purple-400 text-sm font-semibold tracking-wider loading-pulse">Drafting script and generating dialogue...</p>
            </div>

            <!-- Interactive Player Dashboard -->
            <div id="player-section" class="hidden animate__animated animate__fadeIn">
                
                <!-- Music Control Panel -->
                <div class="bg-slate-900/80 border border-white/5 rounded-2xl p-5 mb-6 flex flex-wrap items-center justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-purple-500/10 flex items-center justify-center border border-purple-500/20">
                            <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                            </svg>
                        </div>
                        <div>
                            <h3 class="text-sm font-semibold">Ambient Music</h3>
                            <p class="text-xs text-slate-400">Warm Lights (Lo-Fi)</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 flex-grow md:justify-end">
                        <!-- Music Toggle -->
                        <label class="flex items-center cursor-pointer gap-2.5">
                            <span class="text-xs text-slate-300 font-light">Play music</span>
                            <div class="relative">
                                <input type="checkbox" id="music-toggle" class="sr-only" checked />
                                <div class="w-10 h-5 bg-slate-800 border border-slate-700/50 rounded-full transition-colors toggle-bg"></div>
                                <div class="dot absolute left-0.5 top-0.5 bg-purple-400 w-4 h-4 rounded-full transition-transform translate-x-5"></div>
                            </div>
                        </label>

                        <!-- Volume Slider -->
                        <div class="flex items-center gap-2 flex-grow max-w-[150px]">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                            </svg>
                            <input type="range" id="volume-slider" min="0" max="0.5" step="0.01" value="0.15" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-purple-400" />
                        </div>
                    </div>
                </div>

                <!-- Dialogue Visualizer -->
                <div class="bg-slate-900/60 border border-white/5 rounded-2xl p-6 mb-8 flex flex-col gap-4 max-h-[500px] overflow-y-auto scrollbar-thin relative" id="dialogue-container">
                    <!-- Dialogue bubbles injected dynamically -->
                </div>

                <!-- Playback controls -->
                <div class="flex justify-center gap-4 pt-2">
                    <button id="play-btn" class="bg-purple-600 hover:bg-purple-700 active:scale-95 transition-all text-white px-8 py-3 rounded-full font-semibold flex items-center shadow-lg shadow-purple-500/20">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>
                        </svg>
                        Play Podcast
                    </button>
                    <button id="pause-btn" class="hidden bg-purple-600 hover:bg-purple-700 active:scale-95 transition-all text-white px-8 py-3 rounded-full font-semibold flex items-center shadow-lg shadow-purple-500/20">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 9 9 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                        </svg>
                        Pause
                    </button>
                    <button id="stop-btn" class="bg-slate-800 hover:bg-slate-700 active:scale-95 transition-all text-slate-300 px-8 py-3 rounded-full font-semibold flex items-center border border-slate-700/50">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10h6v6H9z"></path>
                        </svg>
                        Reset / Stop
                    </button>
                </div>
            </div>

            <!-- Submit action trigger -->
            <div class="text-center mt-6" id="generate-btn-container">
                <button id="generate-btn" class="bg-purple-500 hover:bg-purple-600 active:scale-95 transition-all text-white font-semibold px-8 py-3 rounded-full shadow-lg shadow-purple-500/20">
                    Create Podcast
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-6 text-center text-xs text-slate-500 bg-slate-950/40 relative z-10">
        <p>© 2026 Advanced Speech Interaction Platform (ASIP)</p>
    </footer>

    <!-- CSS styles overrides for toggle switch -->
    <style>
        input:checked ~ .toggle-bg {
            background-color: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.4);
        }
        input:checked ~ .dot {
            transform: translateX(20px);
            background-color: #a855f7;
        }
    </style>

    <!-- Scripting for Parser and Alternate Speech Synthesis with Audio -->
    <script>
        const pdfFileInput = document.getElementById('pdf-file');
        const fileNameDisplay = document.getElementById('file-name');
        const generateBtn = document.getElementById('generate-btn');
        const generateBtnContainer = document.getElementById('generate-btn-container');
        const playerSection = document.getElementById('player-section');
        const dialogueContainer = document.getElementById('dialogue-container');
        const loader = document.getElementById('loader');
        const uploadContainer = document.getElementById('upload-container');

        // Audio controls
        const bgMusic = document.getElementById('bg-music');
        const musicToggle = document.getElementById('music-toggle');
        const volumeSlider = document.getElementById('volume-slider');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const stopBtn = document.getElementById('stop-btn');

        // Podcast State
        let script = [];
        let currentLineIndex = 0;
        let isPlaying = false;
        let isPaused = false;
        let host1Voice = null;
        let host2Voice = null;

        // Drag and Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadContainer.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults (e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadContainer.addEventListener(eventName, () => {
                uploadContainer.classList.add('border-purple-400', 'bg-purple-500/5');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadContainer.addEventListener(eventName, () => {
                uploadContainer.classList.remove('border-purple-400', 'bg-purple-500/5');
            }, false);
        });

        uploadContainer.addEventListener('drop', handleDrop, false);

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0 && files[0].type === 'application/pdf') {
                pdfFileInput.files = files;
                updateFileNameDisplay(files[0]);
            }
        }

        pdfFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) updateFileNameDisplay(file);
        });

        function updateFileNameDisplay(file) {
            fileNameDisplay.innerHTML = `<span class="text-purple-400 font-semibold">${file.name}</span> selected`;
        }

        // Toggle Styling in music switch
        musicToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                if (isPlaying && !isPaused) {
                    bgMusic.play().catch(err => console.log(err));
                }
            } else {
                bgMusic.pause();
            }
        });

        // Volume adjustment
        volumeSlider.addEventListener('input', (e) => {
            bgMusic.volume = e.target.value;
        });

        // Fetch Podcast Summary Script
        generateBtn.addEventListener('click', () => {
            if (!pdfFileInput.files || pdfFileInput.files.length === 0) {
                alert('Please upload a PDF first.');
                return;
            }

            // Stop speech and music
            stopPodcast();

            loader.classList.remove('hidden');
            playerSection.classList.add('hidden');
            generateBtnContainer.classList.add('hidden');

            const formData = new FormData();
            formData.append('pdf_file', pdfFileInput.files[0]);

            fetch('/podcast_summary', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loader.classList.add('hidden');
                generateBtnContainer.classList.remove('hidden');

                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    script = parsePodcastScript(data.podcast_content);
                    renderDialogueBubbles();
                    playerSection.classList.remove('hidden');
                    playerSection.scrollIntoView({ behavior: 'smooth' });
                }
            })
            .catch(error => {
                console.error('Error:', error);
                loader.classList.add('hidden');
                generateBtnContainer.classList.remove('hidden');
                alert('An error occurred during podcast generation.');
            });
        });

        // Dialogue parser
        function parsePodcastScript(text) {
            const rawLines = text.split('\n');
            const parsedScript = [];
            
            rawLines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) return;
                
                // Match "Host 1: Dialogue content" or "Host A: Dialogue"
                const match = trimmed.match(/^(Host\s+\d+|Host\s+[A-Za-z]|Speaker\s+\d+|[A-Za-z0-9\s]+):\s*(.*)/i);
                if (match) {
                    const speaker = match[1].trim();
                    const dialogue = match[2].trim();
                    parsedScript.push({
                        speaker: speaker,
                        text: dialogue
                    });
                } else {
                    // Append text to previous dialogue line if it doesn't match speaker format
                    if (parsedScript.length > 0) {
                        parsedScript[parsedScript.length - 1].text += ' ' + trimmed;
                    } else {
                        parsedScript.push({
                            speaker: 'Host 1',
                            text: trimmed
                        });
                    }
                }
            });
            
            return parsedScript;
        }

        // Render dialogue Bubbles
        function renderDialogueBubbles() {
            dialogueContainer.innerHTML = '';
            script.forEach((line, index) => {
                const isHost1 = line.speaker.toLowerCase().includes('1') || line.speaker.toLowerCase().includes('a');
                
                // Format sound effects for italics in HTML
                const formattedDialogue = line.text
                    .replace(/\*(.*?)\*/g, '<span class="italic text-purple-400/90 font-light">* $1 *</span>')
                    .replace(/\((.*?)\)/g, '<span class="italic text-purple-400/90 font-light">($1)</span>');

                const alignClass = isHost1 ? 'self-start mr-12' : 'self-end ml-12';
                const borderClass = isHost1 
                    ? 'border-purple-500/20 hover:border-purple-500/40' 
                    : 'border-indigo-500/20 hover:border-indigo-500/40';
                
                const cardBg = isHost1 ? 'bg-purple-950/20' : 'bg-indigo-950/20';
                const speakerColor = isHost1 ? 'text-purple-400' : 'text-indigo-400';

                const bubbleHtml = `
                    <div id="bubble-${index}" class="glass-card ${cardBg} border ${borderClass} flex flex-col p-5 rounded-2xl ${alignClass} w-auto max-w-[85%] transition-all duration-300 opacity-50 shadow-md">
                        <span class="text-xs font-semibold ${speakerColor} mb-1.5">${line.speaker}</span>
                        <p class="text-slate-300 text-sm font-light leading-relaxed">${formattedDialogue}</p>
                    </div>
                `;
                dialogueContainer.insertAdjacentHTML('beforeend', bubbleHtml);
            });
        }

        // Load distinct voices for Host 1 and Host 2
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            const englishVoices = voices.filter(v => v.lang.startsWith('en-'));
            
            // Preferred voices categories
            const femaleNames = ['zira', 'samantha', 'google us english', 'female', 'hazel', 'karen', 'moira', 'tessa'];
            const maleNames = ['david', 'mark', 'google uk english', 'male', 'ravi', 'richard', 'george'];
            
            host1Voice = null;
            host2Voice = null;

            for (const v of englishVoices) {
                const name = v.name.toLowerCase();
                if (!host1Voice && femaleNames.some(f => name.includes(f))) {
                    host1Voice = v;
                } else if (!host2Voice && maleNames.some(m => name.includes(m))) {
                    host2Voice = v;
                }
            }
            
            // Fallbacks if distinct female/male match not found
            if (!host1Voice && englishVoices.length > 0) host1Voice = englishVoices[0];
            if (!host2Voice && englishVoices.length > 1) host2Voice = englishVoices[1];
            if (!host2Voice) host2Voice = host1Voice;
        }

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
        loadVoices();

        // Highlight active dialogue bubble
        function highlightBubble(index) {
            // Reset opacity and scales on all bubbles
            document.querySelectorAll('.glass-card[id^="bubble-"]').forEach(b => {
                b.classList.remove('border-purple-400', 'border-indigo-400', 'shadow-purple-500/20', 'shadow-indigo-500/20', 'scale-[1.01]', 'opacity-100');
                b.classList.add('opacity-50');
            });

            const activeBubble = document.getElementById(`bubble-${index}`);
            if (activeBubble) {
                activeBubble.classList.remove('opacity-50');
                activeBubble.classList.add('opacity-100', 'scale-[1.01]');
                
                const isHost1 = script[index].speaker.toLowerCase().includes('1') || script[index].speaker.toLowerCase().includes('a');
                if (isHost1) {
                    activeBubble.classList.add('border-purple-400', 'shadow-lg', 'shadow-purple-500/20');
                } else {
                    activeBubble.classList.add('border-indigo-400', 'shadow-lg', 'shadow-indigo-500/20');
                }

                // Scroll bubble container to bring the active speaker bubble into focus
                activeBubble.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Play podcast speech loop
        function speakPodcastLine() {
            if (currentLineIndex >= script.length) {
                stopPodcast();
                return;
            }

            const dialogue = script[currentLineIndex];
            
            // Remove parenthetical notes/actions so browser doesn't speak them
            const cleanSpeechText = dialogue.text
                .replace(/\*.*?\*/g, '')
                .replace(/\(.*?\)/g, '')
                .trim();

            if (!cleanSpeechText) {
                currentLineIndex++;
                speakPodcastLine();
                return;
            }

            highlightBubble(currentLineIndex);

            const utterance = new SpeechSynthesisUtterance(cleanSpeechText);
            
            // Alternate voices depending on speaker
            const isHost1 = dialogue.speaker.toLowerCase().includes('1') || dialogue.speaker.toLowerCase().includes('a');
            utterance.voice = isHost1 ? host1Voice : host2Voice;
            
            // Adjust rate slightly for natural pacing
            utterance.rate = 1.05;

            utterance.onend = () => {
                if (isPlaying && !isPaused) {
                    currentLineIndex++;
                    speakPodcastLine();
                }
            };

            utterance.onerror = (err) => {
                console.error('SpeechSynthesis error:', err);
                if (isPlaying && !isPaused) {
                    currentLineIndex++;
                    speakPodcastLine();
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // Controls Action Listeners
        playBtn.addEventListener('click', () => {
            if (script.length === 0) return;
            
            isPlaying = true;
            
            // Play background music
            bgMusic.volume = volumeSlider.value;
            if (musicToggle.checked) {
                bgMusic.play().catch(err => console.log('Music start error:', err));
            }

            if (isPaused) {
                // Resume from browser pause state
                isPaused = false;
                window.speechSynthesis.resume();
            } else {
                speakPodcastLine();
            }

            playBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
        });

        pauseBtn.addEventListener('click', () => {
            isPaused = true;
            window.speechSynthesis.pause();
            bgMusic.pause();
            
            pauseBtn.classList.add('hidden');
            playBtn.classList.remove('hidden');
        });

        stopBtn.addEventListener('click', () => {
            stopPodcast();
        });

        function stopPodcast() {
            isPlaying = false;
            isPaused = false;
            currentLineIndex = 0;
            
            window.speechSynthesis.cancel();
            bgMusic.pause();
            bgMusic.currentTime = 0;

            // Reset bubble visual styles
            document.querySelectorAll('.glass-card[id^="bubble-"]').forEach(b => {
                b.classList.remove('border-purple-400', 'border-indigo-400', 'shadow-purple-500/20', 'shadow-indigo-500/20', 'scale-[1.01]', 'opacity-100');
                b.classList.add('opacity-50');
            });

            playBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
        }
    </script>
</body>
</html>
