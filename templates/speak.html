<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chatbot - ASIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
                transform: scale(1);
            }
            50% {
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.8);
                transform: scale(1.05);
            }
        }
        .mic-active {
            animation: pulse-glow 2s infinite ease-in-out;
            background: rgba(59, 130, 246, 0.2) !important;
            border-color: rgba(59, 130, 246, 0.5) !important;
            color: #3b82f6 !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 min-h-screen flex flex-col justify-between text-slate-100 font-sans">

    <!-- Decorative glow -->
    <div class="absolute top-0 right-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-12 flex-grow flex flex-col justify-center items-center relative z-10 max-w-3xl">
        
        <!-- Back Navigation -->
        <a href="/" class="self-start mb-8 flex items-center text-slate-400 hover:text-white transition-colors group">
            <svg class="w-5 h-5 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            <span class="text-sm font-semibold">Back to Home</span>
        </a>

        <!-- Chat Container Card -->
        <div class="glass-card rounded-2xl p-8 w-full shadow-2xl animate__animated animate__fadeIn">
            
            <header class="text-center mb-8">
                <h1 class="text-4xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300">
                    Voice Chatbot
                </h1>
                <p class="text-slate-400 text-sm font-light">Interact with AI in real-time using your voice</p>
            </header>

            <!-- Status & Visualizer -->
            <div id="microphone-status" class="mb-8 text-center flex flex-col items-center">
                <button id="mic-trigger-btn" class="w-24 h-24 rounded-full bg-slate-800/80 border border-slate-700/50 flex items-center justify-center text-slate-400 transition-all duration-300 cursor-pointer focus:outline-none hover:border-blue-500/40 hover:text-blue-400">
                    <svg id="mic-icon" class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                    </svg>
                </button>
                <p id="status-text" class="mt-4 text-sm font-semibold tracking-wide text-blue-400">Click icon to start talking</p>
            </div>

            <!-- Speech & Transcription displays -->
            <div class="grid md:grid-cols-2 gap-6 mb-8">
                <!-- User Speech -->
                <div class="bg-slate-900/60 border border-white/5 p-5 rounded-xl flex flex-col h-48">
                    <h3 class="text-xs font-semibold text-blue-400 uppercase tracking-wider mb-2">You (Speech Input)</h3>
                    <div class="overflow-y-auto flex-grow text-slate-300 text-sm font-light leading-relaxed scrollbar-thin" id="transcription-text">
                        Waiting for voice input...
                    </div>
                </div>
                <!-- AI Response -->
                <div class="bg-slate-900/60 border border-white/5 p-5 rounded-xl flex flex-col h-48">
                    <h3 class="text-xs font-semibold text-indigo-400 uppercase tracking-wider mb-2">AI Response</h3>
                    <div class="overflow-y-auto flex-grow text-slate-300 text-sm font-light leading-relaxed scrollbar-thin" id="ai-response-text">
                        AI response will appear here...
                    </div>
                </div>
            </div>

            <!-- Controls Panel -->
            <div class="flex flex-wrap justify-center gap-4">
                <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 active:scale-95 transition-all text-white font-semibold px-6 py-3 rounded-full flex items-center shadow-lg shadow-blue-500/20">
                    <span class="w-2 h-2 rounded-full bg-white animate-ping mr-2"></span> Start Talking
                </button>
                <button id="stop-btn" class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:pointer-events-none active:scale-95 transition-all text-white font-semibold px-6 py-3 rounded-full flex items-center shadow-lg shadow-indigo-500/20" disabled>
                    Get Response
                </button>
                <button id="cancel-speech-btn" class="bg-slate-800 hover:bg-slate-700 hover:text-white transition-all text-slate-300 font-semibold px-6 py-3 rounded-full flex items-center border border-slate-700/50">
                    Stop Voice
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-6 text-center text-xs text-slate-500 bg-slate-950/40 relative z-10">
        <p>© 2026 Advanced Speech Interaction Platform (ASIP)</p>
    </footer>

    <!-- Scripting for Web Speech STT & TTS -->
    <script>
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const cancelSpeechBtn = document.getElementById('cancel-speech-btn');
        const micTriggerBtn = document.getElementById('mic-trigger-btn');
        const micIcon = document.getElementById('mic-icon');
        const statusText = document.getElementById('status-text');
        const transcriptionText = document.getElementById('transcription-text');
        const aiResponseText = document.getElementById('ai-response-text');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isRecording = true;
                finalTranscript = '';
                transcriptionText.textContent = 'Listening... Speak now.';
                statusText.textContent = 'Recording in Progress';
                micTriggerBtn.classList.add('mic-active');
                startBtn.disabled = true;
                stopBtn.disabled = false;
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                transcriptionText.textContent = finalTranscript + interimTranscript;
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                statusText.textContent = 'Error: ' + event.error;
                stopRecording();
            };

            recognition.onend = () => {
                stopRecordingUI();
            };
        } else {
            statusText.textContent = 'Web Speech Recognition not supported in this browser.';
            statusText.className = 'mt-4 text-sm font-semibold tracking-wide text-red-400';
            startBtn.disabled = true;
            micTriggerBtn.disabled = true;
        }

        // Click Mic Button to toggle recording
        micTriggerBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecordingAndFetch();
            } else {
                startRecording();
            }
        });

        startBtn.addEventListener('click', startRecording);
        stopBtn.addEventListener('click', stopRecordingAndFetch);
        
        cancelSpeechBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
        });

        function startRecording() {
            window.speechSynthesis.cancel(); // Stop talking if currently responding
            aiResponseText.textContent = 'AI response will appear here...';
            try {
                recognition.start();
            } catch (e) {
                console.error(e);
            }
        }

        function stopRecording() {
            if (isRecording) {
                try {
                    recognition.stop();
                } catch (e) {
                    console.error(e);
                }
                isRecording = false;
            }
        }

        function stopRecordingUI() {
            micTriggerBtn.classList.remove('mic-active');
            statusText.textContent = 'Recording Stopped';
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function stopRecordingAndFetch() {
            stopRecording();
            stopRecordingUI();
            
            const transcript = transcriptionText.textContent.trim();
            if (!transcript || transcript === 'Listening... Speak now.' || transcript === 'Waiting for voice input...') {
                transcriptionText.textContent = 'No voice input detected.';
                return;
            }

            statusText.textContent = 'Processing request...';
            
            const formData = new URLSearchParams();
            formData.append('transcription', transcript);

            fetch('/voice_to_text', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    aiResponseText.textContent = 'Error: ' + data.error;
                    statusText.textContent = 'Error occurred';
                } else {
                    aiResponseText.textContent = data.response;
                    statusText.textContent = 'Speaking response';
                    // Speak the response in the website
                    speakResponse(data.response);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                aiResponseText.textContent = 'Network error fetching response.';
                statusText.textContent = 'Error occurred';
            });
        }

        function speakResponse(text) {
            window.speechSynthesis.cancel(); // Cancel any ongoing speech first
            
            // Text preprocessing: remove markdown syntax before speaking
            const cleanText = text.replace(/[\*\#\`\_]/g, '');

            const utterance = new SpeechSynthesisUtterance(cleanText);
            
            // Choose an english voice if available
            let voices = window.speechSynthesis.getVoices();
            let englishVoice = voices.find(v => v.lang.startsWith('en-'));
            if (englishVoice) {
                utterance.voice = englishVoice;
            }

            utterance.onend = () => {
                statusText.textContent = 'Click icon to start talking';
            };

            window.speechSynthesis.speak(utterance);
        }

        // Ensure voices are loaded
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {
                // Pre-fetch voices
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
